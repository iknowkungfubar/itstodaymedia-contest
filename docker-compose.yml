version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: campaignpulse-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - campaignpulse_data:/app/backend
    healthcheck:
      test: ["GET", "/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: campaignpulse-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  campaignpulse_data:
